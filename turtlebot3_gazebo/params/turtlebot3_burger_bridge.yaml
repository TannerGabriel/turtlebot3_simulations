# gz topic published by the simulator core
- ros_topic_name: "clock"
  gz_topic_name: "clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# gz topic published by JointState plugin
- ros_topic_name: "joint_states"
  gz_topic_name: "joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# gz topic published by DiffDrive plugin
- ros_topic_name: "odom"
  gz_topic_name: "odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# DiffDrive plugin's raw odom->base_footprint TF is intentionally NOT bridged.
# robot_localization's EKF (see exploration.launch.py + config/ekf.yaml) is the
# sole publisher of odom->base_footprint: it fuses the /odom velocities with the
# IMU yaw rate so the heading stays straight. Bridging the raw wheel TF here
# would create a second, drifting publisher and fight the EKF.
# - ros_topic_name: "tf"
#   gz_topic_name: "tf"
#   ros_type_name: "tf2_msgs/msg/TFMessage"
#   gz_type_name: "gz.msgs.Pose_V"
#   direction: GZ_TO_ROS

# gz topic subscribed to by DiffDrive plugin
- ros_topic_name: "cmd_vel"
  gz_topic_name: "cmd_vel"
  ros_type_name: "geometry_msgs/msg/TwistStamped" # If you use Twist, you need to change the type to Twist
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# gz topic published by IMU plugin
- ros_topic_name: "imu"
  gz_topic_name: "imu"
  ros_type_name: "sensor_msgs/msg/Imu"
  gz_type_name: "gz.msgs.IMU"
  direction: GZ_TO_ROS

# gz topic published by Sensors plugin
- ros_topic_name: "scan"
  gz_topic_name: "scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# --- Oak-D RGBD camera (emulated; see turtlebot3_burger/model.sdf) -----------
# RTAB-Map's rgbd_sync consumes oakd/image + oakd/depth_image + oakd/camera_info.
# oakd/points is bridged for RViz/debugging only and is heavy — disable it if
# the parameter_bridge or network becomes a bottleneck.

# gz topic published by the Oak-D rgbd_camera (RGB)
- ros_topic_name: "oakd/image"
  gz_topic_name: "oakd/image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

# gz topic published by the Oak-D rgbd_camera (registered depth)
- ros_topic_name: "oakd/depth_image"
  gz_topic_name: "oakd/depth_image"
  ros_type_name: "sensor_msgs/msg/Image"
  gz_type_name: "gz.msgs.Image"
  direction: GZ_TO_ROS

# gz topic published by the Oak-D rgbd_camera (intrinsics)
- ros_topic_name: "oakd/camera_info"
  gz_topic_name: "oakd/camera_info"
  ros_type_name: "sensor_msgs/msg/CameraInfo"
  gz_type_name: "gz.msgs.CameraInfo"
  direction: GZ_TO_ROS

# Oak-D point cloud is intentionally NOT bridged: rtabmap consumes
# image+depth+camera_info (via rgbd_sync), not points, and the PointCloud2
# conversion is heavy enough to hurt RTF. Re-add only for RViz debugging.
# - ros_topic_name: "oakd/points"
